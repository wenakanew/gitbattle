name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Check [**GitBattle_Project_Proposal.md**](https://github.com/wenakanew/gitbattle/blob/main/GitBattle_Project_Proposal.md) for planned scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What need does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional — other approaches you thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Game design / rules
        - Backend / API
        - Real-time / WebSockets
        - Frontend / UX
        - Documentation
        - DevOps / CI
        - Other
    validations:
      required: true
