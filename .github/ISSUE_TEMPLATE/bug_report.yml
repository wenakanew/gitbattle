name: Bug report
description: Something is broken or incorrect
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search existing issues first.

        **Do not use this form for security vulnerabilities** — see [SECURITY.md](https://github.com/wenakanew/gitbattle/blob/main/SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser (if relevant), commit or release tag
      placeholder: e.g. Windows 11, Node 22, Chrome 136, main@abc1234

  - type: textarea
    id: extras
    attributes:
      label: Logs / screenshots
      description: Paste logs or attach screenshots if helpful.
